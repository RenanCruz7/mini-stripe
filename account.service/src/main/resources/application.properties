spring.application.name=account-service
server.port=8082

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/account_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Resilience4j Rate Limiter
resilience4j.ratelimiter.instances.accountCreation.registerHealthIndicator=false
resilience4j.ratelimiter.instances.accountCreation.limitRefreshPeriod=1m
resilience4j.ratelimiter.instances.accountCreation.limitForPeriod=50
resilience4j.ratelimiter.instances.accountCreation.timeoutDuration=10s

resilience4j.ratelimiter.instances.accountOperations.registerHealthIndicator=false
resilience4j.ratelimiter.instances.accountOperations.limitRefreshPeriod=1m
resilience4j.ratelimiter.instances.accountOperations.limitForPeriod=100
resilience4j.ratelimiter.instances.accountOperations.timeoutDuration=10s

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Logging Configuration
logging.level.root=INFO
logging.level.account.account.service=DEBUG

# Application Profile
spring.profiles.active=local

