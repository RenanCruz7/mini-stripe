spring.application.name=auth-service
server.port=${SERVER_PORT:8081}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:3f8a2b1c9d4e7f6a0b5c8d2e1f4a7b3c9d6e2f5a8b1c4d7e0f3a6b9c2d5e8f1a}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Resilience4j Rate Limiter
resilience4j.ratelimiter.instances.authLogin.registerHealthIndicator=${RATE_LIMIT_REGISTER_HEALTH:true}
resilience4j.ratelimiter.instances.authLogin.limitRefreshPeriod=${RATE_LIMIT_REFRESH_PERIOD:1m}
resilience4j.ratelimiter.instances.authLogin.limitForPeriod=${RATE_LIMIT_LOGIN:5}
resilience4j.ratelimiter.instances.authLogin.timeoutDuration=${RATE_LIMIT_TIMEOUT:10s}

resilience4j.ratelimiter.instances.authRegister.registerHealthIndicator=${RATE_LIMIT_REGISTER_HEALTH:true}
resilience4j.ratelimiter.instances.authRegister.limitRefreshPeriod=${RATE_LIMIT_REFRESH_PERIOD:1m}
resilience4j.ratelimiter.instances.authRegister.limitForPeriod=${RATE_LIMIT_REGISTER:5}
resilience4j.ratelimiter.instances.authRegister.timeoutDuration=${RATE_LIMIT_TIMEOUT:10s}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Logging Configuration
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.auth.auth.service=${LOG_LEVEL_DEBUG:DEBUG}

# Application Profile
spring.profiles.active=local

