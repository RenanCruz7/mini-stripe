spring.application.name=payment-service
server.port=8083

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/payment_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Kafka Configuration
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.consumer.group-id=payment-service-group
spring.kafka.consumer.auto-offset-reset=earliest

# JWT Configuration
jwt.secret=${JWT_SECRET:3f8a2b1c9d4e7f6a0b5c8d2e1f4a7b3c9d6e2f5a8b1c4d7e0f3a6b9c2d5e8f1a}

# Account Service URL
account-service.url=${ACCOUNT_SERVICE_URL:http://localhost:8082}

# Resilience4j CircuitBreaker
resilience4j.circuitbreaker.instances.accountServiceClient.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.accountServiceClient.slidingWindowSize=10
resilience4j.circuitbreaker.instances.accountServiceClient.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.accountServiceClient.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.accountServiceClient.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.accountServiceClient.failureRateThreshold=50

# Resilience4j Retry
resilience4j.retry.instances.accountServiceClient.maxAttempts=3
resilience4j.retry.instances.accountServiceClient.waitDuration=1000

# Resilience4j Rate Limiter
resilience4j.ratelimiter.instances.paymentCreation.registerHealthIndicator=false
resilience4j.ratelimiter.instances.paymentCreation.limitRefreshPeriod=1m
resilience4j.ratelimiter.instances.paymentCreation.limitForPeriod=100
resilience4j.ratelimiter.instances.paymentCreation.timeoutDuration=10s

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers
management.endpoint.health.show-details=when-authorized
management.health.circuitbreakers.enabled=true

# Logging Configuration
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.payment.payment.service=${LOG_LEVEL_DEBUG:DEBUG}

# Application Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

